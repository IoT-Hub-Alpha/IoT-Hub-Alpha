services:
  kafka:
    image: ghcr.io/iot-hub-alpha/kafka-service:v0.1
    container_name: iot_hub_kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    ports:
      - "9094:9094"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list > /dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks:
      - iot_hub_net

  kafka-admin:
    image: confluentinc/cp-kafka:7.7.1
    container_name: iot_hub_kafka_admin
    restart: "no"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVER: kafka:9092
      KAFKA_ADMIN_ACTION: create
      KAFKA_TOPICS: telemetry.raw,telemetry.clean,telemetry.dlq,event.topic
      KAFKA_PARTITIONS: 3
      KAFKA_REPLICATION_FACTOR: 1
      KAFKA_TOPIC_CONFIGS: cleanup.policy=delete,retention.ms=604800000
    command: ["/bin/sh", "/scripts/kafka-admin.sh"]
    volumes:
      - ./scripts/kafka-admin.sh:/scripts/kafka-admin.sh:ro
    networks:
      - iot_hub_net

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: iot_hub_kafka_ui
    restart: unless-stopped
    profiles: ["kafka-ui"]
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    ports:
      - "8080:8080"
    networks:
      - iot_hub_net

  telemetry-db:
    image: timescale/timescaledb:latest-pg15
    container_name: iot_hub_telemetry_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${TELEMETRY_DB_NAME:-iot_hub_alpha_db}
      POSTGRES_USER: ${TELEMETRY_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${TELEMETRY_DB_PASSWORD:-postgres}
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=en_US.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-telem-db.sh:/docker-entrypoint-initdb.d/init-telem-db.sh
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 5432 -U $${POSTGRES_USER} -d $${POSTGRES_DB} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s
    networks:
      - iot_hub_net
    # TODO: add backup/restore strategy for postgres_data

  # TEMPORARY REDIS! PLEASE REMAKE IT AS A DOCKERFILE ACCORDING TO THE TASK!
  redis:
    image: redis:7-alpine
    container_name: iot_hub_redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 1s
      timeout: 3s
      retries: 30
      start_period: 5s
    # TODO: configure redis auth, persistence, and memory policy
    volumes:
      - redis_data:/data
    networks:
      - iot_hub_net

  db-writer-worker:
    image: ghcr.io/iot-hub-alpha/db-writer:v0.3@sha256:a6025a49e79f9b886b7983836c4153c11e3641c0aec20b4f1e5474eae51637a2
    container_name: iot_hub_worker
    entrypoint: ["/app/scripts/entrypoint-worker.sh"]
    # Use --pool=gevent for I/O-bound tasks or --pool=prefork for CPU-bound tasks.
    command: celery -A db_writer worker -l info --pool=solo
    env_file:
      - envs/db-writer.env
      - .env
    depends_on:
      redis:
        condition: service_healthy
      telemetry-db:
        condition: service_healthy
        
    networks:
      - iot_hub_net
    # TODO: add celery config and queues


  db-writer:
    image: ghcr.io/iot-hub-alpha/db-writer:v0.3@sha256:a6025a49e79f9b886b7983836c4153c11e3641c0aec20b4f1e5474eae51637a2
    entrypoint: ["/app/scripts/entrypoint-writer.sh"]
    command: ["python", "manage.py", "db_writer"]
    ports:
      - "8033:8033"
    env_file:
      - envs/db-writer.env
      - .env
    depends_on:
      telemetry-db:
        condition: service_healthy
    networks:
      - iot_hub_net


networks:
  iot_hub_net:
    name: iot_hub_net

volumes:
  kafka_data:
  redis_data:
  postgres_data: