# =============================================================================
# Mosquitto Broker Configuration — IoT Hub Alpha
# =============================================================================

# ---- Listener ---------------------------------------------------------------
listener 1883
protocol mqtt

# ---- Authentication ---------------------------------------------------------
# Allow anonymous connections (no username/password required).
# Security is deferred to a future milestone — see docs/security.md.
allow_anonymous true

# ---- Connection events ------------------------------------------------------
# Log when clients connect / disconnect (visible in container logs).
connection_messages true

# ---- Persistence ------------------------------------------------------------
persistence true
persistence_location /mosquitto/data/

# ---- Logging ----------------------------------------------------------------
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%S

# ---- Keep-alive -------------------------------------------------------------
# Drop clients that do not send PINGREQ within 1.5× their keepalive interval.
max_keepalive 120
