x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  db:
    image: timescale/timescaledb:latest-pg15
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - iot_hub_net
    logging: *default-logging
    ports:
      - "5432:5432"

  mosquitto:
    build:
      context: ./devops/mosquitto
      dockerfile: Dockerfile
    container_name: iot_hub_mosquitto
    restart: unless-stopped
    ports:
      - "${MQTT_BROKER_PORT:-1883}:1883"
    volumes:
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -t '$$SYS/#' -C 1 -i healthcheck -W 3 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging: *default-logging
    networks:
      - iot_hub_net

  mqtt-ingest:
    image: ghcr.io/iot-hub-alpha/mqtt-ingest:1.0
    container_name: iot_hub_mqtt_ingest
    restart: unless-stopped
    env_file:
      - envs/mqtt.env
    ports:
      - "8011:8000"
    expose:
      - "9103"
    depends_on:
      mosquitto:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging: *default-logging
    networks:
      - iot_hub_net

networks:
  iot_hub_net:
    driver: bridge

volumes:
  postgres_data:
  mosquitto_data:
  mosquitto_log:
