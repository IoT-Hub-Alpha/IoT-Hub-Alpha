x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  kafka:
    image: ghcr.io/iot-hub-alpha/kafka-service:v0.1
    container_name: iot_hub_kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    ports:
      - "9094:9094"
    volumes:
      - kafka_data:/var/lib/kafka/data
    env_file:
      - envs/kafka.env
      - .env
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list > /dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks:
      - iot_hub_net
    logging: *default-logging

  redis:
    image: ghcr.io/iot-hub-alpha/redis-service:latest
    restart: unless-stopped
    env_file:
      - envs/redis-service.env
    volumes:
      - redis_data:/var/lib/redis
    networks:
      - iot_hub_net

  mosquitto:
    build:
      context: ./devops/mosquitto
      dockerfile: Dockerfile
    container_name: iot_hub_mosquitto
    restart: unless-stopped

    ports:
      - "${MQTT_BROKER_PORT:-1883}:1883"
    volumes:
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -t '$$SYS/#' -C 1 -i healthcheck -W 3 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging: *default-logging
    networks:
      - iot_hub_net

  mqtt-ingest:
    image: ghcr.io/iot-hub-alpha/mqtt-ingest:1.0
    container_name: iot_hub_mqtt_ingest
    restart: unless-stopped
    env_file:
      - envs/mqtt.env
    ports:
      - "8011:8000"
    expose:
      - "9103"
    depends_on:
      mosquitto:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - iot_hub_net
    logging: *default-logging

  kafka-admin:
    image: confluentinc/cp-kafka:7.7.1
    container_name: iot_hub_kafka_admin
    restart: "no"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVER: kafka:9092
      KAFKA_ADMIN_ACTION: create
      KAFKA_TOPICS: telemetry.raw,telemetry.clean,telemetry.dlq,event.topic
      KAFKA_PARTITIONS: 3
      KAFKA_REPLICATION_FACTOR: 1
      KAFKA_TOPIC_CONFIGS: cleanup.policy=delete,retention.ms=604800000
    command: ["/bin/sh", "/scripts/kafka-admin.sh"]
    volumes:
      - ./scripts/kafka-admin.sh:/scripts/kafka-admin.sh:ro
    env_file:
      - ./envs/kafka.env
    networks:
      - iot_hub_net

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: iot_hub_kafka_ui
    restart: unless-stopped
    profiles: ["kafka-ui"]
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    ports:
      - "8080:8080"
    networks:
      - iot_hub_net
    logging: *default-logging

  telemetry-db:
    image: timescale/timescaledb:latest-pg15
    container_name: iot_hub_telemetry_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${TELEMETRY_DB_NAME:-iot_hub_alpha_db}
      POSTGRES_USER: ${TELEMETRY_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${TELEMETRY_DB_PASSWORD:-postgres}
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=en_US.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-telem-db.sh:/docker-entrypoint-initdb.d/init-telem-db.sh
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 5432 -U $${POSTGRES_USER} -d $${POSTGRES_DB} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s
    networks:
      - iot_hub_net
    logging: *default-logging
    # TODO: add backup/restore strategy for postgres_data

  db-writer-worker:
    #image: ghcr.io/iot-hub-alpha/db-writer:v0.3@sha256:a6025a49e79f9b886b7983836c4153c11e3641c0aec20b4f1e5474eae51637a2
    build:
      context: ../DB-Writer-Service
    container_name: iot_hub_worker
    entrypoint: ["/app/scripts/entrypoint-worker.sh"]
    # Use --pool=gevent for I/O-bound tasks or --pool=prefork for CPU-bound tasks.
    command: celery -A db_writer worker -l info --pool=solo
    env_file:
      - envs/db-writer.env
      - envs/kafka.env
      - envs/redis-service.env
      - .env
    depends_on:
      - redis
      - telemetry-db  
    networks:
      - iot_hub_net
    logging: *default-logging
    # TODO: add celery config and queues


  db-writer:
    #image: ghcr.io/iot-hub-alpha/db-writer:v0.3@sha256:a6025a49e79f9b886b7983836c4153c11e3641c0aec20b4f1e5474eae51637a2
    build:
      context: ../DB-Writer-Service
    entrypoint: ["/app/scripts/entrypoint-writer.sh"]
    command: ["python", "manage.py", "db_writer"]
    ports:
      - "8033:8033"
    env_file:
      - envs/db-writer.env
      - envs/kafka.env
      - envs/redis-service.env
      - .env
    depends_on:
      - telemetry-db
    networks:
      - iot_hub_net

  telemetry-validator:
    image: ghcr.io/iot-hub-alpha/telemetry-validator-service:v0.1
    # build:
    #   context: ../Telemetry-Validator-Service
    command: ["python", "manage.py", "run_validator"]
    restart: unless-stopped
    env_file:
      - envs/telemetry-validator.env
      - envs/kafka.env
    networks:
      - iot_hub_net

networks:
  iot_hub_net:
    name: iot_hub_net

volumes:
  postgres_data:
  mosquitto_data:
  mosquitto_log:
  kafka_data:
  redis_data:
